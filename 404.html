<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı · Zeynep &amp; Batuhan</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="./assets/images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="./assets/images/favicon.png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=optional" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #f4eee8;
      color: #5a3e36;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem;
    }
    .flower { font-size: 3.5rem; margin-bottom: 1rem; }
    .names {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      color: #8b5e52;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      font-weight: 400;
      color: #7a5c55;
      margin-bottom: 2rem;
    }
    p {
      font-size: 0.95rem;
      color: #9a7b74;
      margin-bottom: 2rem;
      max-width: 320px;
      line-height: 1.6;
    }
    a.home-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #c8967e;
      color: #fff;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a.home-btn:hover { background: #a87060; }
  </style>
</head>
<body>
  <div class="flower">🌸</div>
  <p class="names">Zeynep &amp; Batuhan</p>
  <h1>Aradığınız sayfa bulunamadı</h1>
  <p>Belki de yanlış bir bağlantıyı tıkladınız. Davetiyeye dönmek için aşağıdaki butona tıklayabilirsiniz.</p>
  <a href="/" class="home-btn">Davetiyeye Dön</a>
</body>
</html>
